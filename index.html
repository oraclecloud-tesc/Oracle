<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата услуг - Подтверждение</title>
    <style>
        /* CSS Стили */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Шапка */
        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }
        .logo-placeholder { font-weight: bold; color: #5cb85c; font-size: 20px; }
        .auth-buttons button {
            border: 1px solid #7d67ff;
            background: none;
            color: #7d67ff;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            margin-left: 10px;
        }

        /* Основной контент */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            text-align: center;
        }

        .icon-mail { font-size: 50px; margin-bottom: 20px; }
        h1 { font-size: 22px; color: #333; margin-bottom: 10px; }
        p { color: #666; font-size: 15px; line-height: 1.4; max-width: 320px; }

        /* Поля ввода кода */
        .otp-container {
            display: flex;
            gap: 10px;
            margin: 30px 0;
        }
        .otp-container input {
            width: 45px;
            height: 55px;
            border: 1px solid #ccc;
            border-radius: 8px;
            text-align: center;
            font-size: 24px;
        }

        /* Таймер */
        .timer-circle {
            width: 40px;
            height: 40px;
            border: 2px solid #eee;
            border-top: 2px solid #7d67ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .verify-btn {
            background-color: #b5a8ff;
            color: white;
            border: none;
            width: 100%;
            max-width: 350px;
            padding: 15px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
        }

        /* Футер с логотипами */
        footer {
            padding: 20px;
            background: #f9f9f9;
            text-align: center;
            border-top: 1px solid #eee;
        }
        .payment-logos {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-placeholder">LOGO SMART</div>
        <div class="auth-buttons">
            <button>Войти</button>
        </div>
    </header>

    <main>
        <div class="icon-mail">📧</div>
        <h1>Проверьте почту</h1>
        <p>Для оплаты задолженности (100.00€) введите 6-значный код, отправленный на ваш email.</p>

        <div class="otp-container" id="otp-inputs">
            <input type="text" maxlength="1">
            <input type="text" maxlength="1">
            <input type="text" maxlength="1">
            <input type="text" maxlength="1">
            <input type="text" maxlength="1">
            <input type="text" maxlength="1">
        </div>

        <div class="timer-circle" id="timer">40</div>

        <button class="verify-btn">Подтвердить</button>
    </main>

    <footer>
        <div class="payment-logos">
            <span>VISA</span> | <span>Mastercard</span> | <span>UnionPay</span> | <span>Maestro</span>
        </div>
    </footer>

    <script>
        // Автоматический переход между полями ввода
        const inputs = document.querySelectorAll('#otp-inputs input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', () => {
                if (input.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
        });

        // Простой таймер
        let timeLeft = 40;
        const timerElement = document.getElementById('timer');
        const countdown = setInterval(() => {
            if (timeLeft <= 0) clearInterval(countdown);
            else {
                timeLeft--;
                timerElement.innerText = timeLeft;
            }
        }, 1000);
    </script>
</body>
</html>
