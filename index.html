<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCCsmart Payment</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        /* Шапка с логотипом */
        header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: flex-start;
            box-sizing: border-box;
            border-bottom: 1px solid #f0f0f0;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 22px;
            font-weight: bold;
        }

        .logo span {
            background-color: #5cb85c;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 5px;
        }

        .logo-text {
            color: #777;
            font-weight: 400;
        }

        /* Основной контейнер */
        .container {
            max-width: 400px;
            width: 90%;
            text-align: center;
            margin-top: 80px;
        }

        .illustration {
            font-size: 80px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #222;
        }

        .amount-box {
            background-color: #f8f7ff;
            border: 1px solid #e0daff;
            border-radius: 15px;
            padding: 25px;
            margin: 25px 0;
        }

        .label {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .amount {
            font-size: 42px;
            font-weight: 800;
            color: #5c46e5; /* Фиолетовый цвет с вашего фото */
        }

        .description {
            color: #777;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 40px;
        }

        /* Кнопка оплаты */
        .pay-button {
            background-color: #5c46e5;
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(92, 70, 229, 0.3);
        }

        .pay-button:hover {
            background-color: #4a38c2;
            transform: translateY(-2px);
        }

        .pay-button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <span>JCC</span> <div class="logo-text">smart</div>
        </div>
    </header>

    <div class="container">
        <!-- Иконка задолженности -->
        <div class="illustration">📑</div>

        <h1>Outstanding Balance</h1>
        
        <div class="amount-box">
            <div class="label">Total Amount Due</div>
            <div class="amount">200.00€</div>
        </div>

        <p class="description">
            Your electricity bill is ready for payment. <br>
            Please settle the balance to avoid service interruption.
        </p>

        <button class="pay-button">Pay Now</button>
    </div>

</body>
</html>
