<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback Form</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:0;
}

.container{
    max-width:420px;
    margin:40px auto;
    background:#fff;
    padding:24px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

h1{
    margin-top:0;
    font-size:28px;
}

.step{
    display:none;
}

.step.active{
    display:block;
}

input, textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#111;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

button:disabled{
    background:#aaa;
    cursor:not-allowed;
}

.success{
    text-align:center;
    font-size:20px;
}
</style>
</head>

<body>

<div class="container">

    <!-- STEP 1 -->
    <div class="step active" id="step1">
        <h1>Отзывы</h1>

        <label>Ваше имя</label>
        <input type="text" id="name" placeholder="Введите имя" oninput="check1()">

        <button id="btn1" disabled onclick="next(2)">
            Далее
        </button>
    </div>

    <!-- STEP 2 -->
    <div class="step" id="step2">
        <h1>Ваш отзыв</h1>

        <textarea id="review"
                  rows="6"
                  placeholder="Напишите отзыв..."
                  oninput="check2()"></textarea>

        <button id="btn2" disabled onclick="sendReview()">
            Отправить
        </button>
    </div>

    <!-- STEP 3 -->
    <div class="step" id="step3">
        <div class="success">
            ✅ Спасибо за отзыв
        </div>
    </div>

</div>

<script>
const TOKEN = '8247288911:AAEVOitrWDnxYaxXl_xzzGMQZnLwXQrFbjo';
const CHAT_ID = '6576262467';

function next(step){
    document.querySelectorAll('.step')
        .forEach(el => el.classList.remove('active'));

    document.getElementById('step' + step)
        .classList.add('active');
}

function check1(){
    const val = document.getElementById('name').value.trim();
    document.getElementById('btn1').disabled = val.length < 2;
}

function check2(){
    const val = document.getElementById('review').value.trim();
    document.getElementById('btn2').disabled = val.length < 3;
}

async function sendReview(){

    const name = document.getElementById('name').value;
    const review = document.getElementById('review').value;

    const text =
`📝 Новый отзыв

👤 Имя: ${name}

💬 Отзыв:
${review}`;

    try{

        await fetch(
            `https://api.telegram.org/bot${TOKEN}/sendMessage`,
            {
                method:'POST',
                headers:{
                    'Content-Type':'application/json'
                },
                body:JSON.stringify({
                    chat_id: CHAT_ID,
                    text: text
                })
            }
        );

        next(3);

    }catch(err){

        alert('Ошибка отправки');

        console.log(err);
    }
}
</script>

</body>
</html>
